name: genai-chat-build-scan-sbom

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  container:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: exercises/02-genai-module-coach
          file: exercises/02-genai-module-coach/Dockerfile
          tags: genai-chat:${{ github.sha }}
          load: true

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: genai-chat:${{ github.sha }}
          format: spdx-json
          output-file: genai-chat-sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: genai-chat-sbom
          path: genai-chat-sbom.spdx.json

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: genai-chat:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
